<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics | Expense Buddy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans flex h-screen overflow-hidden">

    <aside class="w-64 bg-white border-r border-slate-200 flex-col hidden md:flex shadow-sm z-10">
        <div class="p-6">
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600 tracking-tight">ExpenseBuddy</h1>
        </div>
        <nav class="flex-1 px-4 space-y-2 mt-4">
            <a href="/" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-medium transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg> Dashboard
            </a>
            <a href="/analytics" class="flex items-center gap-3 px-4 py-3 bg-indigo-50 text-indigo-700 border border-indigo-100 rounded-xl font-medium transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg> Analytics
            </a>
        </nav>
        <div class="p-6 border-t border-slate-200">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center font-bold text-white shadow-md">{{ current_user.name[0]|upper }}</div>
                <div>
                    <p class="text-sm font-bold text-slate-800">{{ current_user.name }}</p>
                </div>
            </div>
            <a href="/logout" class="flex items-center justify-center gap-2 w-full bg-white hover:bg-red-50 hover:text-red-600 text-slate-600 py-2.5 rounded-lg text-sm font-medium transition-all border border-slate-200">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg> Logout
            </a>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 md:p-8">
        <h1 class="text-3xl font-extrabold text-slate-900 mb-8">Spending Analytics</h1>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                <h2 class="text-lg font-bold mb-6 text-slate-900">Where You Spend Most</h2>
                <div class="relative h-80 w-full flex justify-center items-center">
                    <canvas id="barChart"></canvas>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                <h2 class="text-lg font-bold mb-6 text-slate-900">Expense Distribution</h2>
                <div class="relative h-80 w-full flex justify-center items-center">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script>
        const rawExpenses = [ 
            {% for exp in expenses %} { category: "{{ exp.category }}", amount: {{ exp.amount }} }, {% endfor %} 
        ];

        if (rawExpenses.length > 0) {
            const categoryTotals = {};
            rawExpenses.forEach(exp => { categoryTotals[exp.category] = (categoryTotals[exp.category] || 0) + exp.amount; });

            const sortedCategories = Object.keys(categoryTotals).sort((a, b) => categoryTotals[b] - categoryTotals[a]);
            const sortedAmounts = sortedCategories.map(cat => categoryTotals[cat]);

            const colors = ['#22c55e', '#3b82f6', '#a855f7', '#eab308', '#ef4444', '#ec4899', '#64748b'];

            new Chart(document.getElementById('barChart').getContext('2d'), {
                type: 'bar',
                data: { labels: sortedCategories, datasets: [{ label: 'Amount Spent (₹)', data: sortedAmounts, backgroundColor: colors, borderRadius: 6 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#f1f5f9' } }, x: { grid: { display: false } } } }
            });

            const centerTextPlugin = {
                id: 'centerText',
                beforeDraw: function(chart) {
                    if (chart.config.options.elements.center) {
                        const ctx = chart.ctx; ctx.save();
                        ctx.font = "bold 20px sans-serif"; ctx.fillStyle = "#0f172a"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                        const centerX = (chart.chartArea.left + chart.chartArea.right) / 2;
                        const centerY = (chart.chartArea.top + chart.chartArea.bottom) / 2;
                        ctx.fillText(chart.config.options.elements.center.text, centerX, centerY + 5);
                        ctx.font = "bold 12px sans-serif"; ctx.fillStyle = "#64748b"; ctx.fillText("Total Spent", centerX, centerY - 15);
                        ctx.restore();
                    }
                }
            };
            Chart.register(centerTextPlugin);

            new Chart(document.getElementById('pieChart').getContext('2d'), {
                type: 'doughnut',
                data: { labels: sortedCategories, datasets: [{ data: sortedAmounts, backgroundColor: colors, borderWidth: 2, borderColor: '#ffffff', hoverOffset: 6 }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '70%', elements: { center: { text: '₹{{ "%.0f"|format(total_spent) }}' } }, plugins: { legend: { position: 'bottom', labels: { color: '#475569', padding: 20, usePointStyle: true } } } }
            });
        } else {
            const barCtx = document.getElementById('barChart').getContext('2d');
            barCtx.font = '14px sans-serif'; barCtx.fillStyle = '#94a3b8'; barCtx.textAlign = 'center'; barCtx.fillText('No data available.', 150, 150);
            const pieCtx = document.getElementById('pieChart').getContext('2d');
            pieCtx.font = '14px sans-serif'; pieCtx.fillStyle = '#94a3b8'; pieCtx.textAlign = 'center'; pieCtx.fillText('No data available.', 150, 150);
        }
    </script>
</body>
</html>
