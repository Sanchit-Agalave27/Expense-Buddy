<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Transaction | FinanceTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-50 font-sans flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md p-8 bg-slate-900 rounded-2xl border border-slate-800 shadow-2xl relative overflow-hidden">
        
        <div class="absolute -right-10 -top-10 w-40 h-40 bg-indigo-500/10 rounded-full blur-3xl"></div>

        <div class="mb-8 relative z-10 flex items-center gap-3">
            <a href="/" class="text-slate-400 hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            </a>
            <h2 class="text-2xl font-bold text-white">Edit Transaction</h2>
        </div>

        <form action="/update/{{ expense.id }}" method="POST" class="space-y-5 relative z-10">
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wide">Amount (₹)</label>
                <input type="number" step="0.01" name="amount" value="{{ expense.amount }}" required class="w-full p-3 bg-slate-950 border border-slate-700 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-white outline-none transition-all">
            </div>
            
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wide">Category</label>
                <select name="category" class="w-full p-3 bg-slate-950 border border-slate-700 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-white outline-none transition-all appearance-none">
                    <option value="{{ expense.category }}" selected>{{ expense.category }} (Current)</option>
                    <option disabled>──────────</option>
                    <option value="Food">Food & Dining</option>
                    <option value="Travel">Travel & Transport</option>
                    <option value="Housing">Housing & Rent</option>
                    <option value="Bills">Utilities & Bills</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wide">Description</label>
                <input type="text" name="description" value="{{ expense.description }}" required class="w-full p-3 bg-slate-950 border border-slate-700 rounded-lg focus:ring-2 focus:ring-indigo-500 text-white outline-none transition-all">
            </div>
            
            <div class="flex gap-4 pt-4 mt-2">
                <a href="/" class="w-1/3 bg-slate-800 text-slate-300 text-center py-3 rounded-lg hover:bg-slate-700 font-semibold transition-all border border-slate-700">Cancel</a>
                <button type="submit" class="w-2/3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-3 rounded-lg hover:from-indigo-500 hover:to-purple-500 font-bold shadow-lg shadow-indigo-500/20 transition-all">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</body>
</html>
